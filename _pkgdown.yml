url: https://centr-impact.github.io/centrimpact-review/

template:
  bootstrap: 5
  bootswatch: flatly
  mathjax: true

  bslib:
    # Primary brand colors - refined palette
    primary: "#3F5E78"        # Denim blue - sophisticated
    secondary: "#3B6B35"      # Forest green - grounded
    success: "#636b2f"        # Olive green - earthy success
    info: "#6b7894"           # Muted indigo - calm info
    warning: "#E18B4E"        # Burnt orange - warm warning
    danger: "#A64B42"         # Rust - serious danger
    light: "#F0E5D7"          # Soft cream
    dark: "#4E342E"           # Espresso brown

    # Typography - clean and modern
    base_font: {google: "Inter"}
    heading_font: {google: "Work Sans"}
    code_font: {google: "Fira Code"}

    # Page styling
    bg: "#FFFFFF"                    # White background
    fg: "#4A4A4A"                    # Stone grey text
    navbar-bg: "#E8D8C3"             # Soft beige navbar
    navbar-fg: "#4E342E"             # Espresso nav text
    link-color: "#3F5E78"            # Denim blue links
    link-hover-color: "#1E325C"      # Darker indigo on hover
    border-color: "#8e8380"          # Muted espresso borders
    border-radius: "0.5rem"
    headings-font-weight: 600
    headings-color: "#4E342E"        # Espresso headers

    # Extended styling
    card-bg: "#E8D8C3"               # Surface color for cards
    card-border-color: "#8e8380"
    table-bg: "#FFFFFF"
    table-hover-bg: "#F0E5D7"

navbar:
  bg: light
  type: light
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]
  components:
    home:
      icon: fas fa-home
      href: index.html
    reference:
      text: Reference
      href: reference/index.html
    articles:
      text: Articles
      menu:
      - text: Getting Started
        href: articles/getting-started.html
      - text: -------
      - text: "Alignment Analysis"
        href: articles/interpreting_Sa.html
      - text: "Cascade Analysis"
        href: articles/interpreting_Sc.html
      - text: "Dynamics Analysis"
        href: articles/interpreting_Sd.html
    github:
      icon: fab fa-github
      href: https://github.com/CENTR-IMPACT/centrimpact-review
      aria-label: GitHub

home:
  title: "CEnTR*IMPACT"
  description: >
    Community Engaged and Transformative Research - Inclusive Measurement
    of Projects and Community Transformations

  sidebar:
    structure: [links, license, community, citation, authors, dev]

  links:
  - text: CUMU Fellowship Report
    href: https://cumuonline.org/wp-content/uploads/2024-CUMU-Collaboratory-Fellowship-Report.pdf
    icon: fa-file-pdf

reference:
  - title: "Data Generation"
    desc: "Generate example datasets for testing and demonstration"
    contents:
    - starts_with("generate_")

  - title: "Analysis Functions"
    desc: "Compute alignment, cascade, dynamics, and indicator scores"
    contents:
    - starts_with("analyze_")

  - title: "Visualization Functions"
    desc: "Create publication-ready visualizations"
    contents:
    - starts_with("visualize_")

footer:
  structure:
    left: developed_by
    right: built_with
  components:
    developed_by: >
      Developed by Jeremy Forest Price with support from the
      Coalition of Urban and Metropolitan Universities (CUMU) and
      The Collaboratory Research Fellowship Program.
